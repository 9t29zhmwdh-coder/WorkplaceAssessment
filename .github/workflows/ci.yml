name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Syntax, Lint & Smoke Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $parseErrors = $null
          $tokens = $null
          [System.Management.Automation.Language.Parser]::ParseFile("scripts/Invoke-WorkplaceAssessmentV14.ps1", [ref]$tokens, [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path scripts/Invoke-WorkplaceAssessmentV14.ps1 -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

      - name: Smoke test (dry run)
        shell: pwsh
        run: |
          .\scripts\Invoke-WorkplaceAssessmentV14.ps1 -NoOpen
          $report = Get-ChildItem -Path output -Filter *.json -ErrorAction Stop | Select-Object -First 1
          if (-not $report) { throw "No JSON report was generated" }
          $json = Get-Content $report.FullName -Raw | ConvertFrom-Json
          if (-not $json.findings -or $json.findings.Count -eq 0) { throw "Report contains no findings" }
