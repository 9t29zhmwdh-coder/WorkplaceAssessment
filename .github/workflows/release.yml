name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0), for manual test builds without a tag"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "${{ github.event.inputs.version }}"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer\WorkplaceAssessment.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkplaceAssessment-Setup-${{ steps.version.outputs.version }}
          path: dist\WorkplaceAssessment-Setup-*.exe

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WorkplaceAssessment-Setup-*.exe
          generate_release_notes: true
